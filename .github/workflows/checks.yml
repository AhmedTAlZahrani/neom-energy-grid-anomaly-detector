name: Quality Checks

on:
  push:
  pull_request:

jobs:
  test-with-timeout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run tests
        run: pytest tests/ -v --timeout=30
